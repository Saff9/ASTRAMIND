<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1612"/>
      <stop offset="100%" style="stop-color:#231e18"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4763b"/>
      <stop offset="100%" style="stop-color:#e8a030"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#brand)" stroke-width="3" opacity="0.3"/>
  <!-- A shape -->
  <g filter="url(#glow)" fill="url(#brand)">
    <!-- Left leg -->
    <polygon points="256,100 190,380 220,380 256,170 292,380 322,380" fill="url(#brand)"/>
    <!-- Crossbar -->
    <rect x="210" y="270" width="92" height="28" rx="6" fill="url(#brand)"/>
  </g>
  <!-- Dot accent -->
  <circle cx="256" cy="420" r="12" fill="url(#brand)" opacity="0.8"/>
</svg>
