<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
        }

        /* Gradient Background Animation */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(147, 51, 234, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 70%);
            animation: gradientShift 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Glassmorphism Effects */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-strong {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Input Container Glow */
        .input-glow {
            box-shadow: 
                0 0 0 1px rgba(255, 255, 255, 0.1),
                0 4px 20px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .input-glow:focus-within {
            box-shadow: 
                0 0 0 1px rgba(59, 130, 246, 0.5),
                0 8px 30px rgba(59, 130, 246, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Message Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-anim {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Typing Indicator */
        .typing-dot {
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Button Hover Effects */
        .btn-hover {
            transition: all 0.2s ease;
        }
        .btn-hover:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .btn-hover:active {
            transform: translateY(0);
        }

        /* Logo Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .logo-float {
            animation: float 6s ease-in-out infinite;
        }

        /* Pulse Ring for Voice Button */
        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .voice-pulse::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid rgba(59, 130, 246, 0.5);
            animation: pulseRing 2s infinite;
        }

        /* Shimmer Effect for Loading */
        .shimmer {
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.05) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col relative">

    <!-- Animated Background -->
    <div class="gradient-bg"></div>

    <!-- Header -->
    <header class="glass-strong fixed top-0 left-0 right-0 z-50 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button class="p-2 rounded-xl hover:bg-white/10 transition-colors group">
                <svg class="w-6 h-6 text-gray-400 group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <h1 class="text-lg font-semibold tracking-tight text-white/90">New chat</h1>
        </div>
        
        <button class="p-2 rounded-xl hover:bg-white/10 transition-colors group relative overflow-hidden">
            <div class="absolute inset-0 bg-blue-500/20 opacity-0 group-hover:opacity-100 transition-opacity rounded-xl"></div>
            <svg class="w-6 h-6 text-gray-400 group-hover:text-blue-400 transition-colors relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
        </button>
    </header>

    <!-- Main Chat Area -->
    <main class="flex-1 relative z-10 flex flex-col overflow-hidden pt-16 pb-32">
        
        <!-- Empty State / Messages Container -->
        <div id="chatContainer" class="flex-1 overflow-y-auto custom-scroll px-4 flex flex-col items-center justify-center transition-all duration-500">
            
            <!-- Welcome Screen -->
            <div id="welcomeScreen" class="flex flex-col items-center justify-center space-y-8 max-w-2xl mx-auto text-center px-4">
                <!-- Animated Logo -->
                <div class="relative logo-float">
                    <div class="w-24 h-24 rounded-3xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center shadow-2xl shadow-blue-500/30">
                        <svg class="w-14 h-14 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                        </svg>
                    </div>
                    <div class="absolute -inset-4 bg-blue-500/20 rounded-full blur-2xl opacity-50"></div>
                </div>
                
                <h2 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-white via-blue-100 to-white bg-clip-text text-transparent tracking-tight">
                    How can I help you?
                </h2>
                
                <p class="text-gray-400 text-lg max-w-md leading-relaxed">
                    Ask me anything. I can help with writing, analysis, coding, creative tasks, and more.
                </p>

                <!-- Quick Action Chips -->
                <div class="flex flex-wrap justify-center gap-3 mt-8">
                    <button onclick="setInput('Explain quantum computing')" class="px-4 py-2 rounded-full glass text-sm text-gray-300 hover:text-white hover:bg-white/10 transition-all border border-white/10">
                        Explain quantum computing
                    </button>
                    <button onclick="setInput('Write a poem about AI')" class="px-4 py-2 rounded-full glass text-sm text-gray-300 hover:text-white hover:bg-white/10 transition-all border border-white/10">
                        Write a poem about AI
                    </button>
                    <button onclick="setInput('Debug my Python code')" class="px-4 py-2 rounded-full glass text-sm text-gray-300 hover:text-white hover:bg-white/10 transition-all border border-white/10">
                        Debug my Python code
                    </button>
                </div>
            </div>

            <!-- Messages will appear here -->
            <div id="messagesArea" class="w-full max-w-3xl mx-auto space-y-6 hidden pb-8"></div>
        </div>
    </main>

    <!-- Input Area -->
    <div class="fixed bottom-0 left-0 right-0 z-50 p-4 md:p-6">
        <div class="max-w-3xl mx-auto">
            <div class="input-glow glass rounded-3xl p-2 flex flex-col gap-2 relative overflow-hidden">
                <!-- Shimmer effect when thinking -->
                <div id="inputShimmer" class="absolute inset-0 shimmer opacity-0 pointer-events-none transition-opacity duration-300"></div>
                
                <textarea 
                    id="messageInput" 
                    rows="1"
                    class="w-full bg-transparent text-white placeholder-gray-500 px-4 py-3 resize-none outline-none text-base leading-relaxed max-h-32 custom-scroll"
                    placeholder="Type a message or hold to speak..."
                    oninput="autoResize(this)"
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                
                <div class="flex items-center justify-between px-2 pb-1">
                    <div class="flex items-center gap-2">
                        <!-- Think Button -->
                        <button id="thinkBtn" onclick="toggleThink()" class="btn-hover flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 text-sm text-gray-400 hover:text-blue-400 transition-all group">
                            <svg class="w-4 h-4 group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                            </svg>
                            <span class="font-medium">Think</span>
                        </button>
                        
                        <!-- Search Button -->
                        <button id="searchBtn" onclick="toggleSearch()" class="btn-hover flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 text-sm text-gray-400 hover:text-blue-400 transition-all group">
                            <svg class="w-4 h-4 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                            </svg>
                            <span class="font-medium">Search</span>
                        </button>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <!-- Add Button -->
                        <button class="p-2 rounded-full hover:bg-white/10 text-gray-400 hover:text-white transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                            </svg>
                        </button>
                        
                        <!-- Voice/Send Button -->
                        <button id="actionBtn" onclick="handleAction()" class="relative p-3 rounded-full bg-blue-600 hover:bg-blue-500 text-white transition-all btn-hover shadow-lg shadow-blue-600/30">
                            <svg id="micIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
                            </svg>
                            <svg id="sendIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-2">
                <p class="text-xs text-gray-600">AI can make mistakes. Consider checking important information.</p>
            </div>
        </div>
    </div>

    <script>
        let isThinking = false;
        let isSearching = false;
        let messageHistory = [];

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 128) + 'px';
            
            const micIcon = document.getElementById('micIcon');
            const sendIcon = document.getElementById('sendIcon');
            const actionBtn = document.getElementById('actionBtn');
            
            if (textarea.value.trim().length > 0) {
                micIcon.classList.add('hidden');
                sendIcon.classList.remove('hidden');
                actionBtn.classList.remove('voice-pulse');
            } else {
                micIcon.classList.remove('hidden');
                sendIcon.classList.add('hidden');
            }
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function setInput(text) {
            const input = document.getElementById('messageInput');
            input.value = text;
            autoResize(input);
            input.focus();
        }

        function toggleThink() {
            isThinking = !isThinking;
            const btn = document.getElementById('thinkBtn');
            if (isThinking) {
                btn.classList.add('bg-blue-500/20', 'text-blue-400', 'border-blue-500/50');
                btn.classList.remove('bg-white/5', 'text-gray-400', 'border-white/10');
            } else {
                btn.classList.remove('bg-blue-500/20', 'text-blue-400', 'border-blue-500/50');
                btn.classList.add('bg-white/5', 'text-gray-400', 'border-white/10');
            }
        }

        function toggleSearch() {
            isSearching = !isSearching;
            const btn = document.getElementById('searchBtn');
            if (isSearching) {
                btn.classList.add('bg-blue-500/20', 'text-blue-400', 'border-blue-500/50');
                btn.classList.remove('bg-white/5', 'text-gray-400', 'border-white/10');
            } else {
                btn.classList.remove('bg-blue-500/20', 'text-blue-400', 'border-blue-500/50');
                btn.classList.add('bg-white/5', 'text-gray-400', 'border-white/10');
            }
        }

        function handleAction() {
            const input = document.getElementById('messageInput');
            if (input.value.trim().length > 0) {
                sendMessage();
            } else {
                // Voice input simulation
                const btn = document.getElementById('actionBtn');
                btn.classList.add('voice-pulse');
                setTimeout(() => {
                    btn.classList.remove('voice-pulse');
                    setInput('Voice message recorded...');
                }, 2000);
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Hide welcome screen, show messages
            document.getElementById('welcomeScreen').classList.add('hidden');
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.classList.remove('hidden');
            
            // Add user message
            addMessage(message, 'user');
            
            // Clear input
            input.value = '';
            input.style.height = 'auto';
            autoResize(input);
            
            // Show typing indicator
            showTypingIndicator();
            
            // Simulate AI response
            setTimeout(() => {
                removeTypingIndicator();
                const response = generateResponse(message);
                addMessage(response, 'ai');
            }, 1500 + Math.random() * 1000);
        }

        function addMessage(text, sender) {
            const messagesArea = document.getElementById('messagesArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} message-anim`;
            
            const isUser = sender === 'user';
            const avatarBg = isUser ? 'bg-gradient-to-br from-blue-600 to-purple-600' : 'bg-gradient-to-br from-gray-700 to-gray-800';
            const avatarIcon = isUser ? 
                '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>' :
                '<svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>';
            
            messageDiv.innerHTML = `
                <div class="flex items-start gap-3 max-w-[85%] ${isUser ? 'flex-row-reverse' : ''}">
                    <div class="w-8 h-8 rounded-xl ${avatarBg} flex items-center justify-center flex-shrink-0 shadow-lg">
                        ${avatarIcon}
                    </div>
                    <div class="flex-1">
                        <div class="glass rounded-2xl px-4 py-3 text-sm leading-relaxed ${isUser ? 'bg-blue-600/20 border-blue-500/30' : 'border-white/10'}">
                            ${formatMessage(text)}
                        </div>
                        <div class="flex items-center gap-2 mt-1 ${isUser ? 'justify-end' : ''}">
                            <span class="text-xs text-gray-500">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            ${!isUser ? `
                                <button class="text-gray-500 hover:text-white transition-colors" onclick="copyMessage(this)">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                                </button>
                                <button class="text-gray-500 hover:text-white transition-colors">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
            
            messagesArea.appendChild(messageDiv);
            scrollToBottom();
        }

        function formatMessage(text) {
            // Simple markdown-like formatting
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white">$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code class="bg-black/30 px-1.5 py-0.5 rounded text-blue-300 text-xs">$1</code>')
                .replace(/\n/g, '<br>');
        }

        function showTypingIndicator() {
            const messagesArea = document.getElementById('messagesArea');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'flex justify-start message-anim';
            typingDiv.innerHTML = `
                <div class="flex items-start gap-3 max-w-[85%]">
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-gray-700 to-gray-800 flex items-center justify-center flex-shrink-0">
                        <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    </div>
                    <div class="glass rounded-2xl px-4 py-3 border-white/10 flex items-center gap-1">
                        <div class="w-2 h-2 bg-blue-400 rounded-full typing-dot"></div>
                        <div class="w-2 h-2 bg-blue-400 rounded-full typing-dot"></div>
                        <div class="w-2 h-2 bg-blue-400 rounded-full typing-dot"></div>
                    </div>
                </div>
            `;
            messagesArea.appendChild(typingDiv);
            scrollToBottom();
            
            // Show shimmer on input
            document.getElementById('inputShimmer').classList.remove('opacity-0');
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
            document.getElementById('inputShimmer').classList.add('opacity-0');
        }

        function generateResponse(userMessage) {
            const responses = [
                "I understand you're asking about **" + userMessage + "**. This is a fascinating topic that involves multiple layers of complexity. Let me break it down for you:\n\n• First, we need to consider the fundamental principles\n• Then, look at practical applications\n• Finally, examine future implications\n\nWould you like me to elaborate on any specific aspect?",
                "That's an interesting question! Based on my analysis, here are the key points:\n\n1. **Context matters** - Understanding the background is crucial\n2. **Multiple perspectives** - There are several ways to approach this\n3. **Actionable insights** - Here's what you can do next\n\nWhat specific angle interests you most?",
                "I've processed your request regarding *" + userMessage + "*. Here's my comprehensive analysis:\n\n`Processing complete.`\n\nThe data suggests that this requires a nuanced approach. I recommend starting with the basics and gradually building up complexity. Would you like me to provide some concrete examples?",
                "Great question! Let me help you with that. The solution involves:\n\n**Step 1:** Understanding the core concept\n**Step 2:** Applying practical methods  \n**Step 3:** Validating results\n\nThis approach has worked well in similar scenarios. Do you have any specific constraints I should consider?"
            ];
            
            if (isThinking) {
                return "**[Deep Thinking Mode Activated]**\n\nAfter careful consideration of your query *" + userMessage + "*:\n\n• Analyzed from first principles\n• Cross-referenced multiple domains\n• Generated structured reasoning\n\n**Conclusion:** The optimal approach involves systematic decomposition of the problem into manageable components, followed by iterative refinement.\n\nWould you like me to explore any specific branch of this reasoning?";
            }
            
            if (isSearching) {
                return "**[Search Results Integrated]**\n\nBased on real-time information relevant to *" + userMessage + "*:\n\n**Key Findings:**\n• Recent developments in this field show promising trends\n• Expert consensus suggests practical implementation strategies\n• Available data supports a multi-phase approach\n\n**Sources analyzed:** Technical documentation, recent publications, and verified databases.\n\nShall I dive deeper into any specific finding?";
            }
            
            return responses[Math.floor(Math.random() * responses.length)];
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        function copyMessage(btn) {
            const messageDiv = btn.closest('.flex-1').querySelector('.glass');
            const text = messageDiv.innerText;
            navigator.clipboard.writeText(text);
            
            // Visual feedback
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<svg class="w-3 h-3 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
            setTimeout(() => {
                btn.innerHTML = originalHTML;
            }, 2000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('messageInput').focus();
        });
    </script>
</body>
</html>
