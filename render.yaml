services:
  - type: web
    name: astramind-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://astramind.vercel.app
      # Add your AI provider keys in Render dashboard:
      # GROQ_API_KEYS, ANTHROPIC_API_KEYS, GOOGLE_AI_STUDIO_API_KEYS, etc.
    healthCheckPath: /api/v1/health
    autoDeploy: true
